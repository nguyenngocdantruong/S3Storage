{% extends 'base.html' %}

{% block title %}User Profile - S3 Storage{% endblock %}

{% block content %}
<div class="header-actions">
    <div>
        <h1 class="page-title">My Profile</h1>
        <p style="color: var(--text-secondary); margin-top: 0.25rem;">Manage your account details and password.</p>
    </div>
</div>

<div class="player-container">
    <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
        <div style="display: flex; align-items: center; gap: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1.5rem; margin-bottom: 2rem;">
            <div class="audio-artwork" style="width: 70px; height: 70px; font-size: 2rem; margin: 0; box-shadow: none; animation: none;">
                <i class="fa-solid fa-user"></i>
            </div>
            <div>
                <h2 style="font-size: 1.5rem; color: white;">{{ g.user.name }}</h2>
                <span class="badge" style="background: rgba(139, 92, 246, 0.2); color: #c084fc;">
                    Role: {{ g.user.role }}
                </span>
            </div>
        </div>

        <form action="{{ url_for('auth.profile') }}" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" value="{{ g.user.name }}" required>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" class="form-control" value="{{ g.user.dob or '' }}">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ g.user.email }}" required>
            </div>
            
            <div class="form-group">
                <label for="password">New Password (leave empty to keep current)</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••">
            </div>
            
            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2.5rem;">
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-floppy-disk"></i> Save Profile Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
