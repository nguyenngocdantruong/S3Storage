{% extends 'base.html' %}

{% block title %}Register - S3 Storage{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="glass-card" style="width: 100%; max-width: 480px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="width: 50px; height: 50px; object-fit: contain; border-radius: var(--radius-md); margin-bottom: 1rem;">
            <h2 style="font-size: 1.75rem; font-weight: 700; color: #fff;">Create Account</h2>
            <p style="color: var(--text-secondary); margin-top: 0.25rem;">Sign up to browse and stream S3 resources</p>
        </div>

        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Phung Thanh Do"
                    required>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" class="form-control">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="domixi@nananana.com"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                    required>
            </div>



            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.85rem;">
                <i class="fa-solid fa-user-check"></i> Register
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-secondary);">
            Already have an account? <a href="{{ url_for('auth.login') }}"
                style="color: var(--accent-blue); text-decoration: none; font-weight: 500;">Sign In here</a>
        </div>
    </div>
</div>
{% endblock %}
