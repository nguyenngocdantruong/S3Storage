{% extends 'base.html' %}

{% block title %}Login - S3 Storage{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-card" style="width: 100%; max-width: 420px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="width: 50px; height: 50px; object-fit: contain; border-radius: var(--radius-md); margin-bottom: 1rem;">
            <h2 style="font-size: 1.75rem; font-weight: 700; color: #fff;">Welcome Back</h2>
            <p style="color: var(--text-secondary); margin-top: 0.25rem;">Log in to access S3 Storage</p>
        </div>

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; margin-bottom: 1.5rem;">
                <input type="checkbox" id="remember" name="remember" style="width: 16px; height: 16px; accent-color: var(--accent-purple); cursor: pointer;">
                <label for="remember" style="margin: 0; cursor: pointer; user-select: none; font-size: 0.875rem;">Remember me (90 days)</label>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.85rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-secondary);">
            Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--accent-blue); text-decoration: none; font-weight: 500;">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
